<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Call Fermi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 40px rgba(79, 172, 254, 0.4);
            margin-bottom: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .avatar.active {
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(79, 172, 254, 0.4); }
            100% { transform: scale(1.1); box-shadow: 0 0 80px rgba(79, 172, 254, 0.8); }
        }

        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        p.status {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #a0a0a0);
            margin-bottom: 40px;
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-call {
            background-color: #34c759;
            color: white;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
        }

        .btn-end {
            background-color: #ff3b30;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
            display: none;
        }

        .btn-mute {
            background-color: var(--tg-theme-secondary-bg-color, #333333);
            color: var(--tg-theme-text-color, #ffffff);
            display: none;
        }

        .btn-mute.muted {
            background-color: #ff9500;
            color: white;
        }

    </style>
</head>
<body>

    <div class="avatar" id="avatar">F</div>
    <h1>Fermi</h1>
    <p class="status" id="statusText">Ready to call</p>

    <div class="controls">
        <button class="btn-mute" id="muteBtn">🎤</button>
        <button class="btn-call" id="callBtn">📞</button>
        <button class="btn-end" id="endBtn">❌</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expand to full height

        const callBtn = document.getElementById('callBtn');
        const endBtn = document.getElementById('endBtn');
        const muteBtn = document.getElementById('muteBtn');
        const statusText = document.getElementById('statusText');
        const avatar = document.getElementById('avatar');

        let ws = null;
        let audioContext = null;
        let scriptProcessor = null;
        let micStream = null;
        let isMuted = false;

        callBtn.addEventListener('click', async () => {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startCall();
            } catch (err) {
                statusText.innerText = 'Microphone access denied';
                console.error(err);
            }
        });

        endBtn.addEventListener('click', () => {
            endCall();
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
                muteBtn.classList.add('muted');
                muteBtn.innerText = '🔇';
            } else {
                muteBtn.classList.remove('muted');
                muteBtn.innerText = '🎤';
            }
        });

        function startCall() {
            statusText.innerText = 'Connecting...';
            callBtn.style.display = 'none';
            endBtn.style.display = 'flex';
            muteBtn.style.display = 'flex';
            avatar.classList.add('active');

            // Setup WebSocket
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws/call`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                statusText.innerText = 'Connected';
                startAudioCapture();
            };

            ws.onmessage = (event) => {
                if (event.data instanceof ArrayBuffer) {
                    playAudio(event.data);
                } else if (typeof event.data === 'string') {
                    statusText.innerText = event.data;
                    console.error("Server error:", event.data);
                }
            };

            ws.onclose = () => {
                endCall();
            };
        }

        function endCall() {
            statusText.innerText = 'Call ended';
            callBtn.style.display = 'flex';
            endBtn.style.display = 'none';
            muteBtn.style.display = 'none';
            avatar.classList.remove('active');

            if (ws) {
                ws.close();
                ws = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
        }

        // --- Audio Capture (Sending to Gemini) ---
        function startAudioCapture() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(micStream);
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

            source.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = (e) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        // Send silence if manually muted
                        pcm16[i] = isMuted ? 0 : inputData[i] * 32767;
                    }
                    ws.send(pcm16.buffer);
                }
            };
        }

        // --- Audio Playback (Receiving from Gemini) ---
        let nextPlayTime = 0;
        function playAudio(arrayBuffer) {
            if (!audioContext) return;
            
            // Convert Int16Array to Float32Array
            const pcm16 = new Int16Array(arrayBuffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768;
            }

            // Create AudioBuffer (Gemini output is 24000Hz)
            const audioBuffer = audioContext.createBuffer(1, float32.length, 24000);
            audioBuffer.copyToChannel(float32, 0);

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);

            // Schedule playback seamlessly
            if (nextPlayTime < audioContext.currentTime) {
                nextPlayTime = audioContext.currentTime + 0.05; // Small buffer
            }
            source.start(nextPlayTime);
            nextPlayTime += audioBuffer.duration;
        }

    </script>
</body>
</html>
